services:
  backend:
    image: warranty-backend:dev
    build:
      context: ./backend
      target: development
    restart: "no"
    environment:
      - APP_ENV=development
    # volumes:
    #   - ./backend:/app
    develop:
      watch:
        # Sync backend files and reload the FastAPI development server automatically
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - .pytest_cache/
            - .venv/
        # If requirements.txt changes, rebuild the container completely
        - action: rebuild
          path: ./backend/requirements.txt

  frontend:
    image: warranty-frontend:dev
    build:
      context: ./frontend
      target: development
    restart: "no"
    ports:
      - "5173:5173"
    # volumes:
    #   - ./frontend:/app
    develop:
      watch:
        # Sync frontend source code files to enable Vite's native Hot Module Replacement (HMR)
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
        # If package.json changes, rebuild the image to pull in new node_modules
        - action: rebuild
          path: ./frontend/package.json
